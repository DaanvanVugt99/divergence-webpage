<svg xmlns="http://www.w3.org/2000/svg" width="450" height="112" viewBox="55 0 450 112" role="img" aria-labelledby="title">
  <title id="title">Divergence</title>
  <defs>
    <linearGradient id="fill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8fffe1"/>
      <stop offset="0.46" stop-color="#18d39d"/>
      <stop offset="1" stop-color="#07906f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-10%" y="-24%" width="120%" height="152%">
      <feDropShadow dx="0" dy="3" stdDeviation="1.8" flood-color="#001712" flood-opacity="0.48"/>
    </filter>
  </defs>
  <g filter="url(#drop)">
    <text
      x="280"
      y="77"
      text-anchor="middle"
      font-family="Trebuchet MS, Avenir Next, Inter, ui-sans-serif, system-ui, sans-serif"
      font-size="72"
      font-weight="700"
      letter-spacing="2"
      fill="#071b18"
      stroke="#071b18"
      stroke-width="8"
      stroke-linejoin="round"
      paint-order="stroke fill"
    >DIVERGENCE</text>
    <text
      x="280"
      y="77"
      text-anchor="middle"
      font-family="Trebuchet MS, Avenir Next, Inter, ui-sans-serif, system-ui, sans-serif"
      font-size="72"
      font-weight="700"
      letter-spacing="2"
      fill="url(#fill)"
      stroke="#d9fff5"
      stroke-width="1"
      stroke-linejoin="round"
      paint-order="stroke fill"
    >DIVERGENCE</text>
    <text
      x="280"
      y="77"
      text-anchor="middle"
      font-family="Trebuchet MS, Avenir Next, Inter, ui-sans-serif, system-ui, sans-serif"
      font-size="72"
      font-weight="700"
      letter-spacing="2"
      fill="url(#shine)"
    >DIVERGENCE</text>
  </g>
